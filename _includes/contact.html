    <!-- Contact Section -->
    <section id="contact" class="container content-section text-center">
        <div class="row">
            <div class="col-lg-8 col-lg-offset-2">
                <h2>Contact</h2>
                <ul class="list-inline banner-social-buttons">
                    {% for network in site.social %}
                    <li>
                        <a href="{{ network.url }}" class="btn btn-default btn-lg">{% if network.title == "x" %}{% include icons/x-logo.svg %}{% elsif network.title == "bluesky" %}{% include icons/bluesky-logo.svg %}{% else %}<i class="fa fa-{{ network.title }} fa-fw"></i>{% endif %} <span class="network-name">{{ network.title }}</span></a>
                    </li>
                    {% endfor %}
                </ul>
            </div>
        </div>
    </section>
